name: Discord notify - ISXPantheon Scripting Guide

on:
  push:
    paths:
      - 'ISXPantheon Scripting Guide/**'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_PANTHEON }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          event="$GITHUB_EVENT_PATH"

          # one linked line per commit (first line of each message), capped at 10
          desc=$(jq -r '
            if ((.commits // []) | length) > 0 then
              ((.commits[:10] | map("[`" + .id[0:7] + "`](" + .url + ") " + (.message | split("\n")[0]) + " - " + .author.name) | join("\n"))
               + (if ((.commits | length) > 10) then "\n...and " + ((.commits | length) - 10 | tostring) + " more" else "" end))
            else "Manual test run" end' "$event")

          count=$(jq -r '(.commits // []) | length' "$event")
          compare=$(jq -r '.compare // empty' "$event")
          if [ -z "$compare" ]; then compare="https://github.com/${REPO}"; fi

          if [ "$count" -eq 0 ]; then commits="manual run"
          elif [ "$count" -eq 1 ]; then commits="1 commit"
          else commits="${count} commits"; fi

          payload=$(jq -n \
            --arg title "🛡️ ISXPantheon Scripting Guide updated" \
            --arg url "$compare" \
            --arg desc "$desc" \
            --arg actor "$ACTOR" \
            --arg avatar "https://github.com/${ACTOR}.png" \
            --arg ahref "https://github.com/${ACTOR}" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commits "$commits" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{
              author: {name: $actor, url: $ahref, icon_url: $avatar},
              title: $title,
              description: $desc,
              url: $url,
              color: 10181046,
              timestamp: $ts,
              fields: [
                {name: "Repo",    value: $repo,    inline: true},
                {name: "Branch",  value: $branch,  inline: true},
                {name: "Commits", value: $commits, inline: true}
              ],
              footer: {text: "isxDocs · GitHub"}
            }]}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$WEBHOOK"
